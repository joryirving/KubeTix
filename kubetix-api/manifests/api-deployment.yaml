apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubetix-api
  namespace: kubetix
  labels:
    app: kubetix-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubetix-api
  template:
    metadata:
      labels:
        app: kubetix-api
    spec:
      containers:
      - name: api
        image: ghcr.io/joryirving/kubetix-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kubetix-secrets
              key: database-url
        - name: KUBETIX_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: kubetix-secrets
              key: secret-key
        - name: KUBECONFIG
          value: /etc/kubeconfig/config
        - name: OIDC_ENABLED
          value: "true"
        - name: OIDC_ISSUER
          value: "https://authentik.yourdomain.com"
        - name: OIDC_CLIENT_ID
          value: "kubetix"
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: kubetix-secrets
              key: oidc-client-secret
        volumeMounts:
        - name: kubeconfig
          mountPath: /etc/kubeconfig
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: kubeconfig
        secret:
          secretName: kubetix-kubeconfig
          optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: kubetix-api
  namespace: kubetix
  labels:
    app: kubetix-api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  selector:
    app: kubetix-api
