apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubetix-ingress
  namespace: kubetix
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - kubetix.yourdomain.com
    secretName: kubetix-tls
  rules:
  - host: kubetix.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: kubetix-api
            port:
              number: 8000
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: kubetix-api
            port:
              number: 8000
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: kubetix-api
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kubetix-web
            port:
              number: 80
