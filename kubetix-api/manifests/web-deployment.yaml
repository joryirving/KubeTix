apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubetix-web
  namespace: kubetix
  labels:
    app: kubetix-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubetix-web
  template:
    metadata:
      labels:
        app: kubetix-web
    spec:
      containers:
      - name: web
        image: ghcr.io/joryirving/kubetix-web:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_API_URL
          value: http://kubetix-api:8000
        - name: NEXT_PUBLIC_OIDC_ENABLED
          value: "true"
        - name: NEXT_PUBLIC_OIDC_ISSUER
          value: "https://authentik.yourdomain.com"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kubetix-web
  namespace: kubetix
  labels:
    app: kubetix-web
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: kubetix-web
