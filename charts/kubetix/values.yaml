# Default values for KubeTix.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/joryirving/kubetix-api
  pullPolicy: Always
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: kubetix.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: kubetix-tls
      hosts:
        - kubetix.example.com

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Database configuration
database:
  # SQLite (default - simple, no external dependencies)
  sqlite:
    enabled: true
    persistence:
      enabled: true
      size: 1Gi
  
  # PostgreSQL (production recommended)
  postgresql:
    enabled: false
    host: ""
    port: 5432
    database: kubetix
    username: kubetix
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: ""

# OIDC/Authentik configuration
oidc:
  enabled: false
  issuer: ""
  clientId: ""
  clientSecret: ""
  redirectUri: ""
  scopes:
    - openid
    - profile
    - email

# Kubeconfig access (optional)
kubeconfig:
  # Mount existing kubeconfig from secret
  existingSecret: ""
  # Or use default cluster config
  default: false

# External secrets manager configuration
# Supports Vault, AWS Secrets Manager, and etcd encryption
externalSecrets:
  # Enable external secrets management (disables inline secret generation)
  enabled: false
  
  # HashiCorp Vault configuration
  vault:
    enabled: false
    # Vault server address (e.g., https://vault.example.com:8200)
    address: ""
    # Kubernetes auth mount path
    authPath: "kubernetes"
    # Kubernetes auth role name
    role: "kubetix"
    # Namespace to read secrets from (default: default)
    namespace: "default"
    # Path to the secret in Vault (e.g., "secret/data/kubetix")
    secretPath: "secret/data/kubetix"
    # Annotations for the VaultAuthenticatingSecret resource
    annotations: {}
      # vault.hashicorp.com/agent-inject: "true"
      # vault.hashicorp.com/role: "kubetix"
  
  # AWS Secrets Manager configuration
  aws:
    enabled: false
    # Secret ARN or name (e.g., "arn:aws:secretsmanager:us-east-1:123456789012:secret:kubetix-abc123")
    secretArn: ""
    # Region (required if using AWS SM)
    region: ""
    # Use IAM role instead of static credentials
    useIAMRole: true
    # If not using IAM role, specify the secret name containing AWS credentials
    credentialsSecret: ""
    # Key for AWS access key ID in credentials secret
    accessKeyIdKey: "AWS_ACCESS_KEY_ID"
    # Key for AWS secret access key in credentials secret
    secretAccessKeyKey: "AWS_SECRET_ACCESS_KEY"
  
  # etcd encryption configuration
  etcd:
    enabled: false
    # Secret name containing the etcd encryption key
    secretName: ""
    # Key within the secret that holds the encryption key
    key: "encryption-key"
    # Encryption provider (aesgcm or aescbc)
    provider: "aesgcm"

# Environment variables
env: {}
  # API_URL: http://kubetix-api:8000
  # MAX_GRANT_HOURS: "720"
  # DEFAULT_GRANT_HOURS: "24"

# Custom annotations for pods
podAnnotations: {}

# Custom labels for resources
customLabels: {}

# Additional volumes
volumes: []

# Additional volume mounts
volumeMounts: []

# Additional volumes
volumes: []

# Extra volumes (merged with default volumes)
extraVolumes: []

# Extra volume mounts (merged with default volume mounts)
extraVolumeMounts: []

# Liveness probe
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Startup probe
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6
