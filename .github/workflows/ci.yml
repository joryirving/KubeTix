name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 black bandit
    
    - name: Run unit tests
      run: |
        python3 test_kc_share.py -v
    
    - name: Run integration tests
      run: |
        python3 test_integration.py -v

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
    
    - name: Lint with flake8
      run: |
        flake8 kc-share.py --max-line-length=120 --ignore=E501,W503

    - name: Check formatting with black
      run: |
        black --check kc-share.py

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit
    
    - name: Run security scan
      run: |
        bandit -r kc-share.py -ll

  helm-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Install Helm
      uses: azure/setup-helm@v5.0.0

    - name: Lint Helm chart
      run: |
        helm lint ./charts/kubetix

    - name: Template Helm chart
      run: |
        helm template kubetix-test ./charts/kubetix > /dev/null
