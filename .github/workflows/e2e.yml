name: Build and E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to GHCR
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push API image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: kubetix-api
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/kubetix-api:${{ github.sha }}

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: read
      packages: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.14'

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Install Kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

    - name: Install kubectl
      uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
      with:
        version: 'v1.28.0'

    - name: Log in to GHCR
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Kind cluster and deploy
      run: |
        kind create cluster --name kubetix-e2e
        kubectl wait --for=condition=Ready nodes --all --timeout=120s

        # Create namespace first, then set up kubeconfig secret
        kubectl create namespace kubetix

        # Extract kubeconfig for the API pod to use
        kind get kubeconfig --name kubetix-e2e > /tmp/e2e-kubeconfig
        kubectl create secret generic kubetix-kubeconfig \
          --from-file=config=/tmp/e2e-kubeconfig \
          --namespace kubetix

        helm install kubetix-test ./charts/kubetix \
          --namespace kubetix \
          --set image.repository=ghcr.io/${{ github.repository_owner }}/kubetix-api \
          --set image.tag=${{ github.sha }} \
          --set image.pullPolicy=Always \
          --set env[0].name=KUBECONFIG \
          --set env[0].value=/app/kubeconfig/config \
          --set extraVolumes[0].name=kubeconfig \
          --set extraVolumes[0].secret.secretName=kubetix-kubeconfig \
          --set extraVolumeMounts[0].name=kubeconfig \
          --set extraVolumeMounts[0].mountPath=/app/kubeconfig \
          --set extraVolumeMounts[0].readOnly=true \
          --wait \
          --timeout 5m

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/kubetix-test -n kubetix --timeout=120s

    - name: Port forward
      run: |
        kubectl port-forward -n kubetix svc/kubetix-test 8000:8000 &
        echo "PORTFORWARD_PID=$!" >> $GITHUB_ENV
        sleep 10

    - name: Run E2E tests
      run: |
        pytest tests/e2e/ -v --tb=short

    - name: Diagnostics
      if: failure()
      run: |
        echo "=== kubectl get all -n kubetix ==="
        kubectl get all -n kubetix -o wide
        echo "=== kubectl get events -n kubetix ==="
        kubectl get events -n kubetix --sort-by=.lastTimestamp
        echo "=== kubectl describe pods -n kubetix ==="
        kubectl describe pods -n kubetix
        echo "=== kubectl logs -n kubetix ==="
        kubectl logs -n kubetix -l app.kubernetes.io/name=kubetix --all-containers --tail=200
        echo "=== helm status ==="
        helm status kubetix-test -n kubetix
        echo "=== helm get manifest ==="
        helm get manifest kubetix-test -n kubetix

    - name: Cleanup
      if: always()
      run: |
        kind delete cluster --name kubetix-e2e --quiet || true
