name: E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.14'

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Install Kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

    - name: Install kubectl
      uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
      with:
        version: 'v1.28.0'

    - name: Build API image
      run: |
        docker build -t kubetix-api:e2e-${{ github.sha }} ./kubetix-api

    - name: Create Kind cluster
      run: |
        kind create cluster --name kubetix-e2e

    - name: Load image into Kind
      run: |
        kind load docker-image kubetix-api:e2e-${{ github.sha }} --name kubetix-e2e

    - name: Deploy Helm chart
      run: |
        kubectl wait --for=condition=Ready nodes --all --timeout=120s
        helm install kubetix-test ./charts/kubetix \
          --namespace kubetix \
          --create-namespace \
          --set image.repository=kubetix-api \
          --set image.tag=e2e-${{ github.sha }} \
          --set image.pullPolicy=IfNotPresent \
          --wait \
          --timeout 5m

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/kubetix-test -n kubetix --timeout=120s

    - name: Port forward
      run: |
        kubectl port-forward -n kubetix svc/kubetix-test 8000:8000 &
        echo "PORTFORWARD_PID=$!" >> $GITHUB_ENV
        sleep 10

    - name: Run E2E tests
      run: |
        pytest tests/e2e/ -v --tb=short

    - name: Diagnostics
      if: failure()
      run: |
        echo "=== kubectl get all -n kubetix ==="
        kubectl get all -n kubetix -o wide
        echo "=== kubectl get events -n kubetix ==="
        kubectl get events -n kubetix --sort-by=.lastTimestamp
        echo "=== kubectl describe pods -n kubetix ==="
        kubectl describe pods -n kubetix
        echo "=== kubectl logs -n kubetix ==="
        kubectl logs -n kubetix -l app.kubernetes.io/name=kubetix --all-containers --tail=200
        echo "=== helm status ==="
        helm status kubetix-test -n kubetix
        echo "=== helm get manifest ==="
        helm get manifest kubetix-test -n kubetix

    - name: Cleanup
      if: always()
      run: |
        kind delete cluster --name kubetix-e2e --quiet || true
