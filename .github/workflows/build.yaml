name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push API image
      uses: docker/build-push-action@v6
      with:
        context: kubetix-api
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/kubetix-api:${{ github.sha }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: read
      packages: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Install Kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install Helm
      uses: azure/setup-helm@v5

    - name: Install kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: 'v1.28.0'

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Kind cluster and deploy
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        kind create cluster --name kubetix-e2e
        kubectl wait --for=condition=Ready nodes --all --timeout=120s
        helm install kubetix-test ./charts/kubetix \
          --namespace kubetix \
          --create-namespace \
          --set image.tag=$IMAGE_TAG

    - name: Wait for API pod
      run: |
        for i in {1..60}; do
          PHASE=$(kubectl get pods -n kubetix -l app.kubernetes.io/name=kubetix -o jsonpath='{.items[0].status.phase}' 2>/dev/null)
          if [ "$PHASE" = "Running" ]; then
            echo "API pod is running"
            sleep 5
            exit 0
          fi
          sleep 5
        done
        echo "API pod never started"
        exit 1

    - name: Port forward API
      run: |
        kubectl port-forward -n kubetix svc/kubetix-api 8000:8000 &
        echo "PORTFORWARD_PID=$!" >> $GITHUB_ENV
        sleep 10

    - name: Run E2E tests
      run: |
        pytest tests/e2e/ -v --tb=short

    - name: Cleanup
      if: always()
      run: |
        kind delete cluster --name kubetix-e2e --quiet || true