name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.14'

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Install Kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      with:
        version: v3.13.0

    - name: Install kubectl
      uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
      with:
        version: 'v1.28.0'

    - name: Build API image
      if: github.event_name == 'pull_request'
      run: |
        docker build -t kubetix-api:pr-${{ github.sha }} ./kubetix-api

    - name: Create Kind cluster and deploy
      env:
        IMAGE_REPO: ${{ github.event_name == 'pull_request' && 'kubetix-api' || format('ghcr.io/{0}/kubetix-api', github.repository_owner) }}
        IMAGE_TAG: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.sha) || (github.event.pull_request.head.sha || github.sha) }}
        PULL_POLICY: ${{ github.event_name == 'pull_request' && 'Never' || 'Always' }}
      run: |
        kind create cluster --name kubetix-e2e
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          kind load docker-image $IMAGE_REPO:$IMAGE_TAG --name kubetix-e2e
        fi
        kubectl wait --for=condition=Ready nodes --all --timeout=120s
        helm install kubetix-test ./charts/kubetix \
          --namespace kubetix \
          --create-namespace \
          --set image.repository=$IMAGE_REPO \
          --set image.tag=$IMAGE_TAG \
          --set image.pullPolicy=$PULL_POLICY

    - name: Wait for API pod
      run: |
        for i in {1..60}; do
          PHASE=$(kubectl get pods -n kubetix -l app.kubernetes.io/name=kubetix -o jsonpath='{.items[0].status.phase}' 2>/dev/null)
          if [ "$PHASE" = "Running" ]; then
            echo "API pod is running"
            sleep 5
            exit 0
          fi
          sleep 5
        done
        echo "API pod never started"
        exit 1

    - name: Port forward API
      run: |
        kubectl port-forward -n kubetix svc/kubetix-api 8000:8000 &
        echo "PORTFORWARD_PID=$!" >> $GITHUB_ENV
        sleep 10

    - name: Run E2E tests
      run: |
        pytest tests/e2e/ -v --tb=short

    - name: Cleanup
      if: always()
      run: |
        kind delete cluster --name kubetix-e2e --quiet || true
