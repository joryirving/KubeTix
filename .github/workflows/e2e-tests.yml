name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.14'
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
    
    - name: Install Kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
    
    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      with:
        version: v3.13.0
    
    - name: Install kubectl
      uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
      with:
        version: 'v1.28.0'
    
    - name: Create Kind cluster
      run: |
        kind create cluster --name kubetix-e2e
    
    - name: Build and load API image into Kind
      run: |
        docker build -t kubetix-api:kube-e2e ./kubetix-api
        kind load docker-image kubetix-api:kube-e2e --name kubetix-e2e
    
    - name: Wait for nodes to be ready
      run: |
        kubectl wait --for=condition=Ready nodes --all --timeout=120s
    
    - name: Run E2E tests
      run: |
        pytest tests/e2e/ -v --tb=short
    
    - name: Cleanup Kind cluster
      if: always()
      run: |
        kind delete cluster --name kubetix-e2e
